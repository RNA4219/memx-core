fail_closed:
  enabled: true
  conditions:
    - gate: gatekeeper
      event: deny
      action: block_merge
      rollback_required: true
    - gate: governance-gate
      event: failed
      action: block_deploy
      rollback_required: true
    - gate: security-scan
      event: failed
      action: block_release
      rollback_required: true

change_boundary:
  forbidden_paths:
    - "/core/schema/**"
    - "/auth/**"
  restricted_paths:
    - path: "/governance/**"
      requirement: human_approval
    - path: "/memx_spec_v3/schema/**"
      requirement: schema_owner_approval

qa_boundary:
  required_for_merge:
    - unit_tests
    - integration_tests
    - security_scan
  production_deploy_requires:
    - qa_signoff
    - governance_gate_passed
